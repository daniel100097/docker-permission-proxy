# Allows exec into MySQL through DPP, but does not grant inspect.
# Some Docker CLI commands may perform their own inspect before exec; direct API
# clients can use the exec endpoints without inspect.

services:
  mysql:
    image: mysql:8
    user: mysql
    environment:
      MYSQL_ROOT_PASSWORD: example
    labels:
      dpp.rule.self.action: exec
      dpp.rule.self.match: "*"
      dpp.rule.self.exec-user-allow: mysql,1000

  mysql-shell-proxy:
    image: ghcr.io/daniel100097/docker-permission-proxy:main
    user: "1000:975" # replace 975 with: stat -c '%g' /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./run:/var/run/dpp
    environment:
      DPP_LISTEN: unix:///var/run/dpp/socket.sock
      DPP_DEFAULT: deny
