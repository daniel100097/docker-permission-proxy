# Docker Permission Proxy - Example docker-compose.yml
#
# This example shows how to run the proxy with Traefik-style rule configuration.

services:
  docker-proxy:
    build: .
    restart: unless-stopped
    # Required for direct desktop dialogs because /run/user/1000 is private to
    # the logged-in desktop user. Change if your desktop UID/GID differs.
    user: "1000:1000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Direct desktop confirmation support for Wayland/GNOME/KDE.
      - /run/user/1000:/run/user/1000
      # X11 fallback for desktops where zenity uses DISPLAY.
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    environment:
      # Listener configuration
      DPP_LISTEN: "tcp://0.0.0.0:2375"
      DPP_UPSTREAM: "unix:///var/run/docker.sock"
      DPP_DEFAULT: "deny"
      DPP_CONFIRM_TIMEOUT: "30s"
      XDG_RUNTIME_DIR: "/run/user/1000"
      DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/1000/bus"
      DISPLAY: "${DISPLAY:-}"
      WAYLAND_DISPLAY: "${WAYLAND_DISPLAY:-wayland-0}"

      # Rule: Allow exec on containers labeled team=dev, restrict to specific users
      DPP_RULE_devexec_ACTION: "exec"
      DPP_RULE_devexec_MATCH_LABEL_team: "dev"
      DPP_RULE_devexec_EXEC_USER_ALLOW: "1000,1001,deploy"

      # Rule: Allow start/stop/restart/kill on containers labeled env=prod
      DPP_RULE_opsctl_ACTION: "start,stop,restart,kill"
      DPP_RULE_opsctl_MATCH_LABEL_env: "prod"

      # Rule: Ask on the desktop before restarting prod containers
      DPP_RULE_prodask_ACTION: "restart"
      DPP_RULE_prodask_DECISION: "ask"
      DPP_RULE_prodask_MATCH_LABEL_env: "prod"

      # Rule: Allow container creation only for images from our registry
      DPP_RULE_cicreate_ACTION: "create"
      DPP_RULE_cicreate_MATCH_IMAGE: "registry.acme.io/*"

      # Rule: Allow read-only operations on all containers, images, networks, volumes
      DPP_RULE_readall_ACTION: "list,inspect,logs"
      DPP_RULE_readall_TARGET: "container,image,network,volume"
      DPP_RULE_readall_MATCH: "*"
    ports:
      - "127.0.0.1:2375:2375"
    # Add the Docker socket group if needed. Replace with:
    # stat -c '%g' /var/run/docker.sock
    # group_add:
    #   - "999"
